<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
        .cell { width: 100px; height: 100px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; }
        .cell:hover { background-color: #f0f0f0; }
        #status { margin-top: 20px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <div id="status">Player X's Turn</div>

    <script>
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameActive = true;

        function makeMove(index) {
            if (!gameActive || board[index]) return;
            board[index] = currentPlayer;
            document.getElementsByClassName('cell')[index].innerText = currentPlayer;
            
            if (checkWinner()) {
                document.getElementById('status').innerText = `Player ${currentPlayer} Wins!`;
                gameActive = false;
            } else if (!board.includes(null)) {
                document.getElementById('status').innerText = "It's a Draw!";
                gameActive = false;
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                document.getElementById('status').innerText = `Player ${currentPlayer}'s Turn`;
            }
        }

        function checkWinner() {
            const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            return wins.some(combo => combo.every(i => board[i] === currentPlayer));
        }
    </script>
</body>
</html>
